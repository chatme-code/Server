services:
  app:
    build: .
    container_name: migme-backend
    restart: always
    ports:
      - "127.0.0.1:5000:5000"
      - "127.0.0.1:9119:9119"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - SESSION_SECRET=${SESSION_SECRET}
      - REDIS_URL=redis://redis:6379
      - COOKIE_SECURE=false
      - JWT_SECRET=${JWT_SECRET}
      - BREVO_API_KEY=${BREVO_API_KEY}
      - IMAGEKIT_PUBLIC_KEY=${IMAGEKIT_PUBLIC_KEY}
      - IMAGEKIT_PRIVATE_KEY=${IMAGEKIT_PRIVATE_KEY}
      - IMAGEKIT_URL_ENDPOINT=${IMAGEKIT_URL_ENDPOINT}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-migme-internal-admin-2024}
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - migme-net

  admin:
    build: ./admin
    container_name: migme-admin
    restart: always
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - ADMIN_PORT=3001
      - IMAGEKIT_PUBLIC_KEY=${IMAGEKIT_PUBLIC_KEY}
      - IMAGEKIT_PRIVATE_KEY=${IMAGEKIT_PRIVATE_KEY}
      - IMAGEKIT_URL_ENDPOINT=${IMAGEKIT_URL_ENDPOINT}
      - APK_UPLOAD_DIR=/app/apk-uploads
      - WEB_HOST=https://web.migxchat.net
      - MAIN_APP_URL=http://app:5000
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-migme-internal-admin-2024}
    volumes:
      - apk-files:/app/apk-uploads
    depends_on:
      - app
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - migme-net

  web:
    build: ./web
    container_name: migchat-web
    restart: always
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      - NODE_ENV=production
      - WEB_PORT=3002
      - APK_UPLOAD_DIR=/app/apk-files
    volumes:
      - apk-files:/app/apk-files:ro
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - migme-net

  redis:
    image: redis:7-alpine
    container_name: migme-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - migme-net

volumes:
  redis-data:
  apk-files:

networks:
  migme-net:
    driver: bridge
